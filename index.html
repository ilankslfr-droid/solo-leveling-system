<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling: Monarch HUD v26.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00d4ff; --dark: #020b12; }
        body { background: var(--dark); color: white; font-family: 'Roboto Condensed', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .hud-container { max-width: 420px; margin: 10px auto; padding: 20px; background: rgba(5, 15, 25, 0.95); border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        .screen { display: none; min-height: 450px; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hud-header h1 { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--neon); border-bottom: 1px solid var(--neon); padding-bottom: 5px; margin-bottom: 15px; }
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(0,212,255,0.1); }
        .stat-val { color: var(--neon); font-family: 'Orbitron'; font-weight: bold; }
        .xp-bg { background: #111; height: 8px; width: 100%; margin: 10px 0; border: 1px solid #222; }
        .xp-fill { background: var(--neon); height: 100%; width: 0%; transition: 1s; box-shadow: 0 0 10px var(--neon); }
        .quest-card { background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2); padding: 15px; margin-bottom: 10px; }
        .main-btn { width: 100%; background: #000; border: 1px solid var(--neon); color: white; padding: 12px; font-family: 'Orbitron'; cursor: pointer; margin-top: 10px; }
        .main-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(2, 11, 18, 0.98); border-top: 1px solid var(--neon); z-index: 1000; }
        nav button { flex: 1; padding: 20px; background: none; border: none; color: #444; font-family: 'Orbitron'; font-size: 0.7rem; }
        nav button.active-nav { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

<div class="hud-container">
    <div id="status-screen" class="screen active">
        <div class="hud-header"><h1>PLAYER STATUS</h1></div>
        <h2 style="font-family:'Orbitron'; margin:0; font-size: 1.4rem;">SUNG JIN-WOO</h2>
        <div style="font-size: 0.9rem; margin: 5px 0;">RANK: <span id="rank-name" style="font-weight:bold;">E</span></div>
        <div style="font-size: 0.8rem;">LEVEL: <span id="lvl">1</span> | XP: <span id="xp-txt">0/100</span></div>
        <div class="xp-bg"><div id="xp-fill" class="xp-fill"></div></div>
        
        <div class="stat-row"><span>STRENGTH</span> <span id="str" class="stat-val">10</span></div>
        <div class="stat-row"><span>AGILITY</span> <span id="agi" class="stat-val">10</span></div>
        <div class="stat-row"><span>VITALITY</span> <span id="vit" class="stat-val">10</span></div>
        <div class="stat-row"><span>INTELLIGENCE</span> <span id="int" class="stat-val">10</span></div>
        
        <div style="height: 200px; margin-top: 20px;"><canvas id="radarChart"></canvas></div>
    </div>

    <div id="daily-screen" class="screen">
        <div class="hud-header"><h1>DAILY QUEST</h1></div>
        <div class="quest-card">
            <div id="daily-list"></div>
            <button id="btn-collect" class="main-btn" disabled onclick="collectDaily()">COLETAR RECOMPENSA</button>
        </div>
    </div>
</div>

<nav>
    <button onclick="changeTab('status')" id="nav-status" class="active-nav">STATUS</button>
    <button onclick="changeTab('daily')" id="nav-daily">QUESTS</button>
</nav>

<script>
    // Estado do RPG
    let state = JSON.parse(localStorage.getItem('monarch_final_save')) || { 
        lvl: 1, xp: 0, str: 10, agi: 10, vit: 10, int: 10, 
        dailyChecks: [false, false, false, false], 
        dailyDone: false, lastDate: new Date().toDateString() 
    };

    let myChart;
    const sfxClick = new Audio("sons/aba.m4a");
    const bgMusic = new Audio("sons/tema.m4a");
    let musicStarted = false;

    // Reset diário se mudar o dia
    if (state.lastDate !== new Date().toDateString()) {
        state.dailyChecks = [false, false, false, false];
        state.dailyDone = false;
        state.lastDate = new Date().toDateString();
        save();
    }

    function save() { 
        localStorage.setItem('monarch_final_save', JSON.stringify(state)); 
        render(); 
    }

    function startSystemAudio() {
        if (!musicStarted) {
            bgMusic.loop = true;
            bgMusic.volume = 0.4;
            bgMusic.play().catch(() => {});
            setInterval(() => { if (bgMusic.currentTime >= 17) bgMusic.currentTime = 0; }, 500);
            musicStarted = true;
        }
        sfxClick.currentTime = 0;
        sfxClick.play().catch(() => {});
    }

    function render() {
        document.getElementById('lvl').innerText = state.lvl;
        document.getElementById('xp-txt').innerText = state.xp + "/100";
        document.getElementById('xp-fill').style.width = state.xp + "%";
        ['str','agi','vit','int'].forEach(s => document.getElementById(s).innerText = state[s]);
        
        // Render Dailies
        const reps = 10 + (state.lvl * 2);
        const tasks = [`Flexões: ${reps}`, `Abdominais: ${reps}`, `Agachamentos: ${reps}`, `Corrida: 2km`];
        document.getElementById('daily-list').innerHTML = tasks.map((t, i) => `
            <div style="padding:10px 0; border-bottom:1px solid #111">
                <input type="checkbox" onchange="toggleTask(${i})" ${state.dailyChecks[i]?'checked':''} ${state.dailyDone?'disabled':''}> ${t}
            </div>
        `).join('');
        
        document.getElementById('btn-collect').disabled = !state.dailyChecks.every(c => c) || state.dailyDone;
        updateRadar();
    }

    function toggleTask(i) {
        state.dailyChecks[i] = !state.dailyChecks[i];
        sfxClick.currentTime = 0;
        sfxClick.play();
        save();
    }

    function collectDaily() {
        state.xp += 50;
        state.str++; state.agi++; state.vit++;
        state.dailyDone = true;
        while(state.xp >= 100) { state.xp -= 100; state.lvl++; }
        save();
    }

    function updateRadar() {
        const ctx = document.getElementById('radarChart');
        if(!ctx) return;
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['STR', 'AGI', 'VIT', 'INT'],
                datasets: [{ data: [state.str, state.agi, state.vit, state.int], backgroundColor: 'rgba(0, 212, 255, 0.2)', borderColor: '#00d4ff', borderWidth: 2 }]
            },
            options: {
                scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: '#00d4ff', font: { family: 'Orbitron' } }, ticks: { display: false }, suggestedMin: 0, suggestedMax: state.lvl + 10 } },
                plugins: { legend: { display: false } },
                responsive: true, maintainAspectRatio: false
            }
        });
    }

    function changeTab(id) {
        startSystemAudio();
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        document.getElementById(id + '-screen').classList.add('active');
        document.getElementById('nav-' + id).classList.add('active-nav');
        if(id === 'status') setTimeout(updateRadar, 100);
    }

    window.onload = render;
</script>
</body>
</html>
