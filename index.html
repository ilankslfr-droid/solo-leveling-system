<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monarch System v8.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00d4ff; --dark: #020b12; --panel: rgba(5, 15, 25, 0.95); }
        body { background: radial-gradient(circle at center, #0a192f 0%, var(--dark) 100%); color: white; font-family: 'Roboto Condensed', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; touch-action: manipulation; }
        
        .settings-btn { position: fixed; top: 15px; left: 15px; font-size: 1.8rem; cursor: pointer; z-index: 3000; color: var(--neon); filter: drop-shadow(0 0 5px var(--neon)); }
        .settings-menu { display: none; position: fixed; top: 60px; left: 15px; background: var(--panel); border: 1px solid var(--neon); padding: 15px; z-index: 3000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        .hud-container { max-width: 420px; margin: 10px auto; padding: 20px; background: var(--panel); border: 1px solid var(--neon); box-shadow: 0 0 25px rgba(0, 212, 255, 0.2); position: relative; }
        .screen { display: none; min-height: 550px; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .hud-header h1 { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--neon); border-bottom: 1px solid var(--neon); padding-bottom: 8px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Ajuste nas letras da Daily Quest */
        .daily-item { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            background: rgba(0, 212, 255, 0.05); 
            border: 1px solid rgba(0, 212, 255, 0.1); 
            margin-bottom: 12px; 
            padding: 15px; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 0.9rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .daily-item input[type="checkbox"] { transform: scale(1.3); accent-color: var(--neon); cursor: pointer; }
        .daily-item span.completed { text-decoration: line-through; color: #444; }

        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(0,212,255,0.1); }
        .stat-val { color: var(--neon); font-family: 'Orbitron'; font-weight: bold; }
        
        .xp-bg { background: #111; height: 10px; width: 100%; margin: 10px 0; border: 1px solid #333; }
        .xp-fill { background: var(--neon); height: 100%; width: 0%; transition: 1s; box-shadow: 0 0 10px var(--neon); }

        .quest-item { background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2); margin-bottom: 12px; padding: 15px; }
        .timer-display { font-family: 'Orbitron'; color: var(--neon); font-size: 1.4rem; text-align: center; margin: 10px 0; }
        
        input[type="text"], input[type="number"], select { background: #000; border: 1px solid var(--neon); color: white; padding: 10px; font-family: 'Orbitron'; font-size: 0.8rem; width: 100%; box-sizing: border-box; }
        .main-btn { width: 100%; background: #000; border: 1px solid var(--neon); color: white; padding: 15px; font-family: 'Orbitron'; cursor: pointer; margin-top: 10px; text-transform: uppercase; font-weight: bold; }
        .main-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(2, 11, 18, 0.98); border-top: 1px solid var(--neon); z-index: 2500; height: 70px; }
        nav button { flex: 1; background: none; border: none; color: #444; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        nav button.active-nav { color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        #system-notification { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 2px solid var(--neon); padding: 20px; z-index: 5000; text-align: center; min-width: 280px; box-shadow: 0 0 30px var(--neon); backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<div class="settings-btn" onclick="toggleSettings()">⚙️</div>
<div id="settings-menu" class="settings-menu">
    <label style="font-family: 'Orbitron'; font-size: 0.8rem; display: flex; align-items: center; gap: 10px;">
        <input type="checkbox" id="music-toggle" onchange="updateMusicPref()" checked> MÚSICA ATIVA
    </label>
</div>

<div class="hud-container">
    <div id="status-screen" class="screen active">
        <div class="hud-header"><h1>PLAYER STATUS</h1></div>
        <h2 style="font-family:'Orbitron'; margin:0; font-size: 1.6rem;">SUNG JIN-WOO</h2>
        <p style="font-size: 0.9rem; margin: 8px 0;">LVL: <span id="lvl">1</span> | XP: <span id="xp-txt">0/100</span></p>
        <div class="xp-bg"><div id="xp-fill" class="xp-fill"></div></div>
        <div class="stat-row"><span>STR</span> <span id="str" class="stat-val">10</span></div>
        <div class="stat-row"><span>AGI</span> <span id="agi" class="stat-val">10</span></div>
        <div class="stat-row"><span>VIT</span> <span id="vit" class="stat-val">10</span></div>
        <div class="stat-row"><span>INT</span> <span id="int" class="stat-val">10</span></div>
        <div style="height: 200px; margin-top: 20px;"><canvas id="radarChart"></canvas></div>
    </div>

    <div id="daily-screen" class="screen">
        <div class="hud-header"><h1>DAILY QUEST</h1></div>
        <div id="daily-list"></div>
        <button id="btn-collect" class="main-btn" disabled onclick="collectDailyRewards()">COLETAR RECOMPENSA</button>
    </div>

    <div id="custom-screen" class="screen">
        <div class="hud-header"><h1>CUSTOM TRAINING</h1></div>
        <div style="margin-bottom: 20px;">
            <input type="text" id="q-name" placeholder="NOME DO TREINO..." style="margin-bottom: 5px;">
            <div style="display: flex; gap: 5px;">
                <select id="q-attr" style="flex: 2;">
                    <option value="str">FORÇA (STR)</option>
                    <option value="agi">AGILIDADE (AGI)</option>
                    <option value="vit">VITALIDADE (VIT)</option>
                    <option value="int">INTELIGÊNCIA (INT)</option>
                </select>
                <input type="number" id="q-time" placeholder="MIN" style="flex: 1;">
            </div>
            <button onclick="createNewQuest()" class="main-btn">ADICIONAR</button>
        </div>
        <div id="quest-list"></div>
    </div>

    <div id="system-notification">
        <h2 style="font-family:'Orbitron'; color:var(--neon); margin:0; font-size:1.2rem;">NOTIFICAÇÃO</h2>
        <p id="notif-message" style="font-family:'Orbitron'; margin:15px 0; color:white; font-size: 0.9rem;"></p>
        <button onclick="closeNotif()" class="main-btn" style="margin:0; padding:10px;">OK</button>
    </div>
</div>

<nav>
    <button onclick="changeTab('status')" id="nav-status" class="active-nav">STATUS</button>
    <button onclick="changeTab('daily')" id="nav-daily">DAILY</button>
    <button onclick="changeTab('custom')" id="nav-custom">TRAINING</button>
</nav>

<script>
    let state = JSON.parse(localStorage.getItem('monarch_v8_save')) || {
        lvl: 1, xp: 0, str: 10, agi: 10, vit: 10, int: 10,
        dailyChecks: [false, false, false, false], dailyDone: false,
        customQuests: [], musicEnabled: true
    };

    let radarChart;
    const sfx = new Audio("sons/aba.m4a");
    const bgm = new Audio("sons/tema.m4a");
    let isBgmInitialized = false;

    function save() { localStorage.setItem('monarch_v8_save', JSON.stringify(state)); renderAll(); }
    function toggleSettings() { const menu = document.getElementById('settings-menu'); menu.style.display = menu.style.display === 'block' ? 'none' : 'block'; }
    function updateMusicPref() { state.musicEnabled = document.getElementById('music-toggle').checked; state.musicEnabled ? bgm.play() : bgm.pause(); save(); }

    function initAudio() {
        if (state.musicEnabled && !isBgmInitialized) {
            bgm.loop = true; bgm.volume = 0.4; bgm.play().catch(()=>{});
            setInterval(() => { if (bgm.currentTime >= 17.5) bgm.currentTime = 0; }, 500);
            isBgmInitialized = true;
        }
        sfx.currentTime = 0; sfx.play().catch(()=>{});
    }

    function showNotif(msg) { document.getElementById('notif-message').innerText = msg; document.getElementById('system-notification').style.display = 'block'; sfx.currentTime = 0; sfx.play(); }
    function closeNotif() { document.getElementById('system-notification').style.display = 'none'; }

    function renderAll() {
        document.getElementById('lvl').innerText = state.lvl;
        document.getElementById('xp-txt').innerText = `${state.xp}/100`;
        document.getElementById('xp-fill').style.width = `${state.xp}%`;
        ['str','agi','vit','int'].forEach(s => document.getElementById(s).innerText = state[s]);

        const dailyTasks = ["Flexões: 12", "Abdominais: 12", "Agachamentos: 12", "Corrida: 2km"];
        document.getElementById('daily-list').innerHTML = dailyTasks.map((t, i) => `
            <div class="daily-item">
                <input type="checkbox" onchange="toggleDaily(${i})" ${state.dailyChecks[i] ? 'checked' : ''} ${state.dailyDone ? 'disabled' : ''}> 
                <span class="${state.dailyChecks[i] ? 'completed' : ''}">${t}</span>
            </div>`).join('');
        document.getElementById('btn-collect').disabled = !state.dailyChecks.every(v => v) || state.dailyDone;

        document.getElementById('quest-list').innerHTML = state.customQuests.map((q, i) => `
            <div class="quest-item">
                <div style="display:flex; justify-content:space-between; font-size:0.7rem; font-family:'Orbitron';">
                    <span>${q.name} (+1 ${q.attr.toUpperCase()})</span>
                    <span onclick="deleteQuest(${i})" style="color:red; cursor:pointer;">[X]</span>
                </div>
                <div class="timer-display" id="timer-${i}">${formatSeconds(q.remaining)}</div>
                <button class="main-btn" onclick="startQuestTimer(${i})" ${q.isRunning || q.isDone ? 'disabled' : ''}>
                    ${q.isDone ? 'CONCLUÍDO' : q.isRunning ? 'TREINANDO...' : 'INICIAR'}
                </button>
            </div>`).join('');
        updateRadar();
    }

    function toggleDaily(i) { state.dailyChecks[i] = !state.dailyChecks[i]; save(); }
    function collectDailyRewards() { state.xp += 50; state.str++; state.agi++; state.dailyDone = true; checkLevelUp(); showNotif("MISSÃO DIÁRIA CONCLUÍDA!"); save(); }
    function createNewQuest() { const name = document.getElementById('q-name').value; const attr = document.getElementById('q-attr').value; const mins = parseInt(document.getElementById('q-time').value) || 1; if (name) { state.customQuests.push({ name, attr, remaining: mins * 60, isRunning: false, isDone: false }); save(); } }

    function startQuestTimer(i) {
        if (state.customQuests[i].isRunning) return;
        initAudio();
        state.customQuests[i].isRunning = true;
        const interval = setInterval(() => {
            if (state.customQuests[i].remaining <= 0) {
                clearInterval(interval);
                state.customQuests[i].isRunning = false; state.customQuests[i].isDone = true;
                state[state.customQuests[i].attr]++; state.xp += 15; checkLevelUp();
                showNotif(`TREINO FINALIZADO: +1 ${state.customQuests[i].attr.toUpperCase()}`);
                save();
            } else {
                state.customQuests[i].remaining--;
                let el = document.getElementById(`timer-${i}`);
                if(el) el.innerText = formatSeconds(state.customQuests[i].remaining);
            }
        }, 1000);
        renderAll();
    }

    function deleteQuest(i) { state.customQuests.splice(i, 1); save(); }
    function checkLevelUp() { while (state.xp >= 100) { state.xp -= 100; state.lvl++; } }
    function formatSeconds(s) { return `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`; }

    function updateRadar() {
        const ctx = document.getElementById('radarChart'); if (!ctx) return;
        if (radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['STR', 'AGI', 'VIT', 'INT'],
                datasets: [{ data: [state.str, state.agi, state.vit, state.int], backgroundColor: 'rgba(0, 212, 255, 0.2)', borderColor: '#00d4ff', borderWidth: 2, pointRadius: 2 }]
            },
            options: {
                scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: '#00d4ff', font: { family: 'Orbitron' } }, ticks: { display: false }, suggestedMin: 0, suggestedMax: 30 } },
                plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false
            }
        });
    }

    function changeTab(id) { initAudio(); document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(`${id}-screen`).classList.add('active'); document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav')); document.getElementById(`nav-${id}`).classList.add('active-nav'); if (id === 'status') setTimeout(updateRadar, 100); }
    window.onload = renderAll;
</script>
</body>
</html>
