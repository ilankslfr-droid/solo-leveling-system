<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monarch System v6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00d4ff; --dark: #020b12; --panel: rgba(5, 15, 25, 0.95); }
        body { background: radial-gradient(circle at center, #0a192f 0%, var(--dark) 100%); color: white; font-family: 'Roboto Condensed', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* Botão de Configurações */
        .settings-btn { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; cursor: pointer; z-index: 2000; color: var(--neon); }
        .settings-menu { display: none; position: absolute; top: 55px; left: 20px; background: var(--panel); border: 1px solid var(--neon); padding: 15px; z-index: 2000; }

        .hud-container { max-width: 420px; margin: 10px auto; padding: 20px; background: var(--panel); border: 1px solid var(--neon); box-shadow: 0 0 25px rgba(0, 212, 255, 0.2); position: relative; }
        .screen { display: none; min-height: 520px; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .hud-header h1 { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--neon); border-bottom: 1px solid var(--neon); padding-bottom: 8px; margin-bottom: 15px; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,212,255,0.1); }
        .stat-val { color: var(--neon); font-family: 'Orbitron'; font-weight: bold; }
        
        .xp-bg { background: #111; height: 8px; width: 100%; margin: 10px 0; border: 1px solid #333; }
        .xp-fill { background: var(--neon); height: 100%; width: 0%; transition: 1s; box-shadow: 0 0 10px var(--neon); }

        .quest-item { background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2); margin-bottom: 10px; padding: 12px; }
        .timer-display { font-family: 'Orbitron'; color: var(--neon); font-size: 1.2rem; text-align: center; margin: 5px 0; }
        
        input, select { background: #000; border: 1px solid #333; color: white; padding: 8px; font-family: 'Orbitron'; font-size: 0.7rem; }
        .main-btn { width: 100%; background: #000; border: 1px solid var(--neon); color: white; padding: 12px; font-family: 'Orbitron'; cursor: pointer; margin-top: 5px; }
        .main-btn:disabled { opacity: 0.3; }

        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(2, 11, 18, 0.98); border-top: 1px solid var(--neon); z-index: 1000; }
        nav button { flex: 1; padding: 18px; background: none; border: none; color: #444; font-family: 'Orbitron'; font-size: 0.6rem; }
        nav button.active-nav { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

<div class="settings-btn" onclick="toggleSettings()">⚙️</div>
<div id="settings-menu" class="settings-menu">
    <label style="font-family: 'Orbitron'; font-size: 0.7rem;">
        <input type="checkbox" id="music-toggle" onchange="handleMusicToggle()" checked> MÚSICA ATIVA
    </label>
</div>

<div class="hud-container">
    <div id="status-screen" class="screen active">
        <div class="hud-header"><h1>PLAYER STATUS</h1></div>
        <h2 style="font-family:'Orbitron'; margin:0; font-size: 1.4rem;">SUNG JIN-WOO</h2>
        <p style="font-size: 0.8rem; margin: 5px 0;">LVL: <span id="lvl">1</span> | XP: <span id="xp-txt">0/100</span></p>
        <div class="xp-bg"><div id="xp-fill" class="xp-fill"></div></div>
        <div class="stat-row"><span>STR</span> <span id="str" class="stat-val">10</span></div>
        <div class="stat-row"><span>AGI</span> <span id="agi" class="stat-val">10</span></div>
        <div class="stat-row"><span>VIT</span> <span id="vit" class="stat-val">10</span></div>
        <div class="stat-row"><span>INT</span> <span id="int" class="stat-val">10</span></div>
        <div style="height: 180px; margin-top: 15px;"><canvas id="radarChart"></canvas></div>
    </div>

    <div id="daily-screen" class="screen">
        <div class="hud-header"><h1>DAILY QUEST</h1></div>
        <div id="daily-list"></div>
        <button id="btn-collect" class="main-btn" disabled onclick="collectDaily()">COLETAR RECOMPENSA</button>
    </div>

    <div id="custom-screen" class="screen">
        <div class="hud-header"><h1>CUSTOM TRAINING</h1></div>
        <div style="display:flex; flex-direction:column; gap:5px; margin-bottom:15px;">
            <input type="text" id="q-name" placeholder="NOME DO TREINO...">
            <div style="display:flex; gap:5px;">
                <select id="q-attr" style="flex:1;"><option value="str">STR</option><option value="agi">AGI</option><option value="vit">VIT</option><option value="int">INT</option></select>
                <input type="number" id="q-time" placeholder="MIN" style="width:60px;">
            </div>
            <button onclick="addQuest()" class="main-btn">CRIAR</button>
        </div>
        <div id="quest-list"></div>
    </div>
</div>

<nav>
    <button onclick="tab('status')" id="nav-status" class="active-nav">STATUS</button>
    <button onclick="tab('daily')" id="nav-daily">DAILY</button>
    <button onclick="tab('custom')" id="nav-custom">TRAINING</button>
</nav>

<script>
    let state = JSON.parse(localStorage.getItem('monarch_v6')) || {
        lvl: 1, xp: 0, str: 10, agi: 10, vit: 10, int: 10,
        dailyChecks: [false,false,false,false], dailyDone: false,
        customQuests: [], musicOn: true
    };

    let myChart;
    const sfx = new Audio("sons/aba.m4a");
    const bgm = new Audio("sons/tema.m4a");
    let musicStarted = false;

    function save() { localStorage.setItem('monarch_v6', JSON.stringify(state)); render(); }

    function toggleSettings() {
        const m = document.getElementById('settings-menu');
        m.style.display = m.style.display === 'block' ? 'none' : 'block';
    }

    function handleMusicToggle() {
        state.musicOn = document.getElementById('music-toggle').checked;
        if(!state.musicOn) { bgm.pause(); } else { bgm.play(); }
        save();
    }

    function startAudio() {
        if (state.musicOn && !musicStarted) {
            bgm.loop = true; bgm.volume = 0.4; bgm.play().catch(()=>{});
            setInterval(() => { if(bgm.currentTime >= 17) bgm.currentTime = 0; }, 500);
            musicStarted = true;
        }
        sfx.currentTime = 0; sfx.play().catch(()=>{});
    }

    function render() {
        document.getElementById('lvl').innerText = state.lvl;
        document.getElementById('xp-txt').innerText = state.xp + "/100";
        document.getElementById('xp-fill').style.width = state.xp + "%";
        ['str','agi','vit','int'].forEach(s => document.getElementById(s).innerText = state[s]);
        document.getElementById('music-toggle').checked = state.musicOn;

        // Daily
        const tasks = [`Flexões: ${10+state.lvl*2}`, `Abdominais: ${10+state.lvl*2}`, `Agachamentos: ${10+state.lvl*2}`, `Corrida: 2km`];
        document.getElementById('daily-list').innerHTML = tasks.
