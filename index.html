<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling: Monarch HUD v23.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon-blue: #00d4ff; --bg-dark: #020b12; }
        body { 
            background: radial-gradient(circle at center, #0a192f 0%, var(--bg-dark) 100%); 
            color: white; 
            font-family: 'Roboto Condensed', sans-serif; 
            margin: 0; 
            padding-bottom: 110px; 
            overflow-x: hidden; 
        }
        .hud-container { 
            max-width: 420px; 
            margin: 15px auto; 
            padding: 20px; 
            background: rgba(5, 15, 25, 0.96); 
            border: 1px solid var(--neon-blue); 
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.15); 
            backdrop-filter: blur(15px); 
        }
        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .hud-header h1 { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--neon-blue); border-bottom: 1px solid var(--neon-blue); padding-bottom: 5px; margin-bottom: 15px; text-transform: uppercase; }
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(0,212,255,0.1); font-size: 1rem; }
        .stat-value { color: var(--neon-blue); font-family: 'Orbitron'; font-weight: bold; }
        
        .xp-container { background:#111; height:6px; width:100%; margin:10px 0; border: 1px solid #222; }
        .xp-bar { background:var(--neon-blue); height:100%; width:0%; transition: 1s; box-shadow: 0 0 10px var(--neon-blue); }
        
        .radar-box { 
            background: rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(0, 212, 255, 0.1); 
            padding: 15px; 
            height: 250px; 
            margin-top: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        canvas { max-width: 100%; max-height: 100%; }

        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(2, 11, 18, 0.98); border-top: 1px solid var(--neon-blue); z-index: 100; }
        nav button { flex: 1; padding: 18px; background: none; border: none; color: #444; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; transition: 0.3s; }
        nav button.active-nav { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
    </style>
</head>
<body>

<audio id="bg-theme" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="hud-container">
    <div id="status-screen" class="screen active">
        <div class="hud-header"><h1>Player Status</h1></div>
        <h2 style="font-family:'Orbitron'; margin:0; font-size: 1.8rem; letter-spacing: 2px;">SUNG JIN-WOO</h2>
        <div style="font-size: 0.9rem; margin: 10px 0; color: #aaa;">RANK: <span id="rank-name" style="color:var(--neon-blue); font-weight:bold;">E</span></div>
        
        <div style="font-size: 0.85rem; display: flex; justify-content: space-between;">
            <span>LEVEL: <span id="lvl">1</span></span>
            <span>XP: <span id="xp-txt">0/100</span></span>
        </div>
        <div class="xp-container"><div id="xp-fill" class="xp-bar"></div></div>

        <div id="stats-display">
            <div class="stat-row"><span>FORÇA (STR)</span> <span id="str" class="stat-value">10</span></div>
            <div class="stat-row"><span>AGILIDADE (AGI)</span> <span id="agi" class="stat-value">10</span></div>
            <div class="stat-row"><span>VITALIDADE (VIT)</span> <span id="vit" class="stat-value">10</span></div>
            <div class="stat-row"><span>INTELIGÊNCIA (INT)</span> <span id="int" class="stat-value">10</span></div>
        </div>

        <div class="radar-box">
            <canvas id="radarChart"></canvas>
        </div>
    </div>

    <div id="daily-screen" class="screen">
        <div class="hud-header"><h1>Daily Quest</h1></div>
        <div style="text-align: center; padding: 40px 0; color: #444; font-family: 'Orbitron';">
            [ MISSÕES DIÁRIAS CARREGANDO... ]
        </div>
    </div>

    <div id="custom-screen" class="screen">
        <div class="hud-header"><h1>System Quests</h1></div>
        <div style="text-align: center; padding: 40px 0; color: #444; font-family: 'Orbitron';">
            [ AGUARDANDO COMANDO DO MONARCA ]
        </div>
    </div>
</div>

<nav>
    <button onclick="showScreen('status')" id="nav-status" class="active-nav">STATUS</button>
    <button onclick="showScreen('daily')" id="nav-daily">DAILY</button>
    <button onclick="showScreen('custom')" id="nav-custom">CUSTOM</button>
</nav>

<script>
    // Estado do Jogador
    let state = JSON.parse(localStorage.getItem('monarch_v23')) || { 
        lvl: 1, xp: 0, str: 10, agi: 10, vit: 10, int: 10 
    };
    
    let myChart;
    const theme = document.getElementById('bg-theme');

    // Inicialização do Gráfico
    function initRadar() {
        const ctx = document.getElementById('radarChart').getContext('2d');
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['STR', 'AGI', 'VIT', 'INT'],
                datasets: [{
                    data: [state.str, state.agi, state.vit, state.int],
                    backgroundColor: 'rgba(0, 212, 255, 0.2)',
                    borderColor: '#00d4ff',
                    borderWidth: 2,
                    pointBackgroundColor: '#00d4ff'
                }]
            },
            options: {
                scales: {
                    r: {
                        angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        pointLabels: { color: '#00d4ff', font: { family: 'Orbitron', size: 10 } },
                        ticks: { display: false },
                        suggestedMin: 0,
                        suggestedMax: 20
                    }
                },
                plugins: { legend: { display: false } },
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }

    // Controle de Telas e Áudio
    function showScreen(id) {
        // Toca a música (Sawano Theme) no primeiro clique
        if (theme.paused) {
            theme.currentTime = 0; // Começa do início
            theme.play().catch(e => console.log("Aguardando interação para áudio."));
            
            // Loop forçado nos 17 segundos se desejar precisão absoluta
            setInterval(() => {
                if (theme.currentTime >= 17) theme.currentTime = 0;
            }, 100);
        }

        // Troca de abas
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        
        document.getElementById(id + '-screen').classList.add('active');
        document.getElementById('nav-' + id).classList.add('active-nav');

        if (id === 'status') {
            setTimeout(initRadar, 50);
        }
    }

    // Atualiza Interface
    function render() {
        document.getElementById('lvl').innerText = state.lvl;
        document.getElementById('xp-txt').innerText = state.xp + "/100";
        document.getElementById('xp-fill').style.width = state.xp + "%";
        document.getElementById('str').innerText = state.str;
        document.getElementById('agi').innerText = state.agi;
        document.getElementById('vit').innerText = state.vit;
        document.getElementById('int').innerText = state.int;
        initRadar();
    }

    window.onload = render;
</script>

</body>
</html>
