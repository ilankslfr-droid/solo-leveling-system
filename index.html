<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monarch HUD Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00d4ff; --dark: #020b12; }
        body { background: var(--dark); color: white; font-family: 'Roboto Condensed', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .hud-container { max-width: 420px; margin: 10px auto; padding: 20px; background: rgba(5, 15, 25, 0.95); border: 1px solid var(--neon); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        .screen { display: none; min-height: 400px; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .hud-header h1 { font-family: 'Orbitron'; font-size: 1.2rem; color: var(--neon); border-bottom: 1px solid var(--neon); padding-bottom: 5px; margin-bottom: 20px; text-transform: uppercase; }
        .stat-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(0,212,255,0.1); }
        .stat-val { color: var(--neon); font-family: 'Orbitron'; font-weight: bold; }
        .xp-bg { background: #111; height: 8px; width: 100%; margin: 10px 0; border: 1px solid #222; }
        .xp-fill { background: var(--neon); height: 100%; width: 0%; transition: 1s; box-shadow: 0 0 10px var(--neon); }
        .radar-box { background: rgba(0,0,0,0.3); height: 250px; margin-top: 20px; display: flex; justify-content: center; align-items: center; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(2, 11, 18, 0.98); border-top: 1px solid var(--neon); z-index: 1000; }
        nav button { flex: 1; padding: 20px; background: none; border: none; color: #444; font-family: 'Orbitron'; font-size: 0.75rem; cursor: pointer; }
        nav button.active-nav { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

<div class="hud-container">
    <div id="status-screen" class="screen active">
        <div class="hud-header"><h1>Player Status</h1></div>
        <h2 style="font-family:'Orbitron'; margin:0; font-size: 1.5rem;">SUNG JIN-WOO</h2>
        <div style="margin: 10px 0; font-size: 0.9rem;">LVL: <span id="lvl">1</span> | XP: <span id="xp-txt">0/100</span></div>
        <div class="xp-bg"><div id="xp-fill" class="xp-fill"></div></div>
        
        <div class="stat-row"><span>STRENGTH</span> <span id="str" class="stat-val">10</span></div>
        <div class="stat-row"><span>AGILITY</span> <span id="agi" class="stat-val">10</span></div>
        <div class="stat-row"><span>VITALITY</span> <span id="vit" class="stat-val">10</span></div>
        <div class="stat-row"><span>INTELLIGENCE</span> <span id="int" class="stat-val">10</span></div>
        
        <div class="radar-box"><canvas id="radarChart"></canvas></div>
    </div>

    <div id="daily-screen" class="screen">
        <div class="hud-header"><h1>Daily Quest</h1></div>
        <div style="text-align:center; padding:50px 20px; color:#555; font-family:'Orbitron';">
            [ LOADING SYSTEM DATA... ]
        </div>
    </div>
</div>

<nav>
    <button onclick="changeTab('status')" id="nav-status" class="active-nav">STATUS</button>
    <button onclick="changeTab('daily')" id="nav-daily">QUEST</button>
</nav>

<script>
    let state = JSON.parse(localStorage.getItem('monarch_mobile')) || { lvl: 1, xp: 0, str: 15, agi: 12, vit: 10, int: 8 };
    let myChart;

    // --- AUDIO MOBILE OPTIMIZED ---
    const sfxClick = new Audio("sons/aba.m4a");
    const bgMusic = new Audio("sons/tema.m4a");
    
    // Força o carregamento no Mobile
    sfxClick.load();
    bgMusic.load();

    function startAudio() {
        if (bgMusic.paused) {
            bgMusic.loop = true;
            bgMusic.volume = 0.4;
            bgMusic.play().catch(() => {});
            
            // Loop de 17 segundos (Tema Sawano)
            setInterval(() => {
                if (bgMusic.currentTime >= 17) bgMusic.currentTime = 0;
            }, 500);
        }
        sfxClick.currentTime = 0;
        sfxClick.play().catch(() => {});
    }

    function updateRadar() {
        const ctx = document.getElementById('radarChart');
        if(!ctx) return;
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['STR', 'AGI', 'VIT', 'INT'],
                datasets: [{
                    data: [state.str, state.agi, state.vit, state.int],
                    backgroundColor: 'rgba(0, 212, 255, 0.2)',
                    borderColor: '#00d4ff',
                    borderWidth: 2,
                    pointRadius: 0
                }]
            },
            options: {
                scales: {
                    r: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        angleLines: { color: 'rgba(255,255,255,0.1)' },
                        pointLabels: { color: '#00d4ff', font: { family: 'Orbitron', size: 10 } },
                        ticks: { display: false },
                        suggestedMin: 0,
                        suggestedMax: 20
                    }
                },
                plugins: { legend: { display: false } },
                responsive: true,
                maintainAspectRatio: false
            }
        });
    }

    function changeTab(id) {
        startAudio(); // Ativa sons no clique
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        document.getElementById(id + '-screen').classList.add('active');
        document.getElementById('nav-' + id).classList.add('active-nav');
        if(id === 'status') setTimeout(updateRadar, 100);
    }

    window.onload = () => {
        document.getElementById('lvl').innerText = state.lvl;
        document.getElementById('xp-fill').style.width = state.xp + "%";
        document.getElementById('str').innerText = state.str;
        document.getElementById('agi').innerText = state.agi;
        document.getElementById('vit').innerText = state.vit;
        document.getElementById('int').innerText = state.int;
        updateRadar();
    };
</script>
</body>
</html>
