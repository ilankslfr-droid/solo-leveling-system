<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monarch System v10.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00d4ff; --dark: #020b12; --panel: rgba(5, 15, 25, 0.95); --danger: #ff4444; --gold: #ffd700; }
        body { background: radial-gradient(circle at center, #0a192f 0%, var(--dark) 100%); color: white; font-family: 'Roboto Condensed', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        .hud-container { max-width: 420px; margin: 10px auto; padding: 20px; background: var(--panel); border: 1px solid var(--neon); box-shadow: 0 0 25px rgba(0, 212, 255, 0.2); }
        .screen { display: none; min-height: 550px; }
        .active { display: block; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .hud-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon); padding-bottom: 8px; margin-bottom: 15px; }
        .hud-header h1 { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--neon); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .settings-btn { background: none; border: 1px solid var(--neon); color: var(--neon); font-size: 1rem; cursor: pointer; padding: 4px 8px; font-family: 'Orbitron'; }

        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,212,255,0.1); }
        .stat-val { color: var(--neon); font-family: 'Orbitron'; font-weight: bold; }
        .xp-bg { background: #111; height: 10px; width: 100%; margin: 10px 0; border: 1px solid #333; }
        .xp-fill { background: var(--neon); height: 100%; width: 0%; transition: 1s; box-shadow: 0 0 10px var(--neon); }

        .daily-item { display: flex; align-items: center; gap: 15px; background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.1); margin-bottom: 10px; padding: 12px; font-family: 'Orbitron'; font-size: 0.8rem; border-left: 4px solid var(--neon); }
        .quest-item { background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2); margin-bottom: 12px; padding: 15px; }
        .timer-display { font-family: 'Orbitron'; color: var(--neon); font-size: 1.5rem; text-align: center; margin: 10px 0; }

        .shop-tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .shop-tabs button { flex: 1; padding: 10px; font-size: 0.6rem; border: 1px solid var(--neon); background: none; color: var(--neon); font-family: 'Orbitron'; cursor: pointer; }
        .shop-tabs button.active-tab { background: var(--neon) !important; color: black !important; font-weight: bold; }
        .shop-item { background: rgba(255, 255, 255, 0.03); border-left: 3px solid var(--neon); padding: 12px; margin-bottom: 10px; }

        .main-btn { width: 100%; background: #000; border: 1px solid var(--neon); color: white; padding: 12px; font-family: 'Orbitron'; cursor: pointer; margin-top: 5px; text-transform: uppercase; font-size: 0.75rem; }
        .main-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(2, 11, 18, 0.98); border-top: 1px solid var(--neon); z-index: 2500; height: 70px; }
        nav button { flex: 1; background: none; border: none; color: #444; font-family: 'Orbitron'; font-size: 0.6rem; cursor: pointer; }
        nav button.active-nav { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        #modal-settings, #penalty-overlay, #system-notification { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: var(--panel); border: 2px solid var(--neon); padding: 20px; text-align: center; }
    </style>
</head>
<body>

<audio id="snd-tab" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="snd-bg" loop src="https://www.chosic.com/wp-content/uploads/2021/07/The-Darkest-Path.mp3"></audio>

<div class="hud-container">
    <div class="hud-header">
        <h1 id="screen-title">STATUS</h1>
        <button class="settings-btn" onclick="openSettings()">⚙️</button>
    </div>

    <div id="status-screen" class="screen active">
        <p id="player-title" style="color:var(--gold); font-family:'Orbitron'; font-size:0.7rem; margin:0;">TITULO: NOVATO</p>
        <h2 style="font-family:'Orbitron'; margin:5px 0;">JOGADOR <span id="rank-txt" style="float:right; font-size:0.9rem; color:var(--neon);">[RANK E]</span></h2>
        
        <div style="background: rgba(0,212,255,0.05); padding: 10px; border: 1px solid rgba(0,212,255,0.1); margin-bottom: 10px;">
            <p style="font-size: 0.8rem; margin: 0;">LVL: <span id="lvl">1</span> | XP: <span id="xp-txt">0/100</span></p>
            <div class="xp-bg"><div id="xp-fill" class="xp-fill"></div></div>
            <p style="font-size: 0.8rem; margin: 0; color:var(--gold);">GOLD: <span id="gold-txt">0</span></p>
        </div>

        <div class="stat-row"><span>STR</span> <span id="str" class="stat-val">10</span></div>
        <div class="stat-row"><span>AGI</span> <span id="agi" class="stat-val">10</span></div>
        <div class="stat-row"><span>VIT</span> <span id="vit" class="stat-val">10</span></div>
        <div class="stat-row"><span>INT</span> <span id="int" class="stat-val">10</span></div>
        <p id="active-equip-txt" style="font-size:0.6rem; color:var(--neon); margin-top:5px;">EQUIP: NENHUM</p>
        
        <div style="width: 100%; height: 200px; margin-top: 15px;"><canvas id="radarChart"></canvas></div>
    </div>

    <div id="daily-screen" class="screen">
        <div id="daily-list"></div>
        <button id="btn-collect" class="main-btn" disabled onclick="collectDailyRewards()">COLETAR RECOMPENSAS</button>
    </div>

    <div id="custom-screen" class="screen">
        <div style="background: rgba(0,212,255,0.1); padding:10px; margin-bottom:15px; border: 1px solid var(--neon);">
            <input type="text" id="q-name" placeholder="NOME DO TREINO..." style="margin-bottom:8px; background:#000; border:1px solid var(--neon); color:white; padding:10px; width:100%; box-sizing:border-box; font-family:'Orbitron';">
            <div style="display: flex; gap: 8px;">
                <select id="q-attr" style="flex: 2; background:#000; border:1px solid var(--neon); color:white; padding:10px; font-family:'Orbitron';">
                    <option value="str">FORÇA (STR)</option>
                    <option value="agi">AGILIDADE (AGI)</option>
                    <option value="vit">VITALIDADE (VIT)</option>
                    <option value="int">INTELIGÊNCIA (INT)</option>
                </select>
                <input type="number" id="q-time" placeholder="MIN" style="flex: 1; background:#000; border:1px solid var(--neon); color:white; padding:10px; font-family:'Orbitron'; width: 70px;">
            </div>
            <button onclick="createNewQuest()" class="main-btn">CRIAR MISSÃO</button>
        </div>
        <div id="quest-list"></div>
    </div>

    <div id="shop-screen" class="screen">
        <div class="shop-tabs">
            <button onclick="setShopTab('titles')" id="tab-titles">TÍTULOS</button>
            <button onclick="setShopTab('equip')" id="tab-equip">ARSENAL</button>
            <button onclick="setShopTab('potions')" id="tab-potions">POÇÕES</button>
        </div>
        <div id="shop-content"></div>
    </div>
</div>

<nav>
    <button onclick="changeTab('status')" id="nav-status" class="active-nav">STATUS</button>
    <button onclick="changeTab('daily')" id="nav-daily">DAILY</button>
    <button onclick="changeTab('custom')" id="nav-custom">TRAINING</button>
    <button onclick="changeTab('shop')" id="nav-shop">SHOP</button>
</nav>

<div id="modal-settings">
    <div class="modal-content">
        <h2 style="font-family:'Orbitron'; color:var(--neon);">SISTEMA</h2>
        <button class="main-btn" onclick="toggleMusic()">LIGAR/DESLIGAR MÚSICA</button>
        <button class="main-btn" onclick="closeSettings()" style="margin-top:20px;">VOLTAR</button>
    </div>
</div>

<div id="system-notification">
    <div class="modal-content">
        <h2 id="notif-title" style="font-family:'Orbitron'; color:var(--neon);">AVISO</h2>
        <p id="notif-message"></p>
        <button onclick="closeNotif()" class="main-btn">ENTENDIDO</button>
    </div>
</div>

<div id="penalty-overlay">
    <div class="modal-content">
        <h1 style="color:var(--danger); font-family:'Orbitron';">PENALIDADE ATIVA!</h1>
        <p>VOCÊ FALHOU NO TREINO ANTERIOR.</p>
        <div style="text-align:left; background:rgba(255,0,0,0.1); padding:15px; font-size:0.8rem; border:1px solid var(--danger);">
            - 100 FLEXÕES<br>- 100 ABDOMINAIS<br>- 100 AGACHAMENTOS<br>- 10KM CORRIDA
        </div>
        <button class="main-btn btn-danger" onclick="clearPenalty()">TREINO CONCLUÍDO</button>
    </div>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('monarch_vfinal_save')) || {
        lvl: 1, xp: 0, str: 10, agi: 10, vit: 10, int: 10, gold: 0,
        dailyChecks: [], dailyDone: false, customQuests: [],
        currentTitle: "NOVATO", activeEquip: { name: "NENHUM", multiplier: 1 },
        lastUpdate: new Date().toDateString(), penaltyActive: false, isMusicOn: false
    };

    let activeIntervals = {};
    let radarChart = null;
    let currentShopTab = 'potions';

    function save() { localStorage.setItem('monarch_vfinal_save', JSON.stringify(state)); renderAll(); }
    function getRequiredXP(lvl) { return 100 + (lvl - 1) * 10; }
    
    function addXP(amount) {
        state.xp += amount * (state.activeEquip.multiplier || 1);
        while (state.xp >= getRequiredXP(state.lvl)) {
            state.xp -= getRequiredXP(state.lvl);
            state.lvl++;
        }
        save();
    }

    function getRankLabel() {
        if(state.lvl >= 81) return "S"; if(state.lvl >= 11) return "D"; return "E";
    }

    function getDailyTasks() {
        if(state.lvl >= 11) return ["Flexões Declinadas: 25", "Abdominais: 25", "Afundos: 25", "Corrida: 3km"];
        return ["Flexões: 12", "Abdominais: 12", "Agachamentos: 12", "Corrida: 2km"];
    }

    function renderDaily() {
        const tasks = getDailyTasks();
        if (state.dailyChecks.length !== tasks.length) state.dailyChecks = new Array(tasks.length).fill(false);
        const list = document.getElementById('daily-list');
        if(!list) return;

        list.innerHTML = tasks.map((t, i) => `
            <div class="daily-item">
                <input type="checkbox" onchange="toggleDaily(${i})" ${state.dailyChecks[i] ? 'checked' : ''} ${state.dailyDone ? 'disabled' : ''}> 
                <span style="${state.dailyChecks[i] ? 'text-decoration:line-through; opacity:0.5;' : ''}">${t}</span>
            </div>`).join('');
        document.getElementById('btn-collect').disabled = !state.dailyChecks.every(v => v) || state.dailyDone;
    }

    function toggleDaily(i) { state.dailyChecks[i] = !state.dailyChecks[i]; save(); }
    function collectDailyRewards() { state.gold += 50; addXP(50); state.str++; state.dailyDone = true; save(); }

    function createNewQuest() {
        const n = document.getElementById('q-name').value;
        const t = parseInt(document.getElementById('q-time').value);
        if(n && t) { 
            state.customQuests.push({name:n, attr:document.getElementById('q-attr').value, remaining:t*60, isRunning:false, isDone:false}); 
            document.getElementById('q-name').value = '';
            document.getElementById('q-time').value = '';
            save(); 
        }
    }

    function startQuest(i) {
        if(state.customQuests[i].isRunning || state.customQuests[i].isDone) return;
        state.customQuests[i].isRunning = true;
        activeIntervals[i] = setInterval(() => {
            if(state.customQuests[i].remaining <= 0) {
                clearInterval(activeIntervals[i]);
                state.customQuests[i].isRunning = false;
                state.customQuests[i].isDone = true;
                state[state.customQuests[i].attr]++;
                addXP(30);
                save();
            } else {
                state.customQuests[i].remaining--;
                renderAll();
            }
        }, 1000);
        renderAll();
    }

    function deleteQuest(i) { clearInterval(activeIntervals[i]); state.customQuests.splice(i, 1); save(); }

    function setShopTab(t) { currentShopTab = t; renderShop(); }
    function renderShop() {
        let html = '';
        if (currentShopTab === 'potions') {
            html = `<div class="shop-item" style="border-left-color: #00d4ff"><b>POÇÃO DE XP (+50 XP)</b><button class="main-btn" onclick="buyItem('xp_small', 1000)">1000 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #00d4ff"><b>POÇÃO DE XP MAIOR (+150 XP)</b><button class="main-btn" onclick="buyItem('xp_medium', 2500)">2500 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #00d4ff"><b>POÇÃO DE XP SUPREMA (+300 XP)</b><button class="main-btn" onclick="buyItem('xp_big', 3000)">3000 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #ff4444"><b>ELIXIR DE FORÇA (+1 FORÇA)</b><button class="main-btn" onclick="buyItem('str', 1200)">1200 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #44ff44"><b>ELIXIR DE AGILIDADE (+1 AGILIDADE)</b><button class="main-btn" onclick="buyItem('agi', 1200)">1200 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #cc44ff"><b>ELIXIR DE INTELIGÊNCIA (+1 INTELIGÊNCIA)</b><button class="main-btn" onclick="buyItem('int', 1200)">1200 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #ffff44"><b>ELIXIR DE VITALIDADE (+1 VITALIDADE)</b><button class="main-btn" onclick="buyItem('vit', 1200)">1200 GOLD</button></div>`
        } else if (currentShopTab === 'titles') {
            html = `<div class="shop-item" style="border-left-color: #888"><b>CAÇADOR DE LOBOS</b><button class="main-btn" onclick="buyTitle('CAÇADOR DE LOBOS', 500)">500 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #007bff"><b>ASSASSINO DE REIS</b><button class="main-btn" onclick="buyTitle('ASSASSINO DE REIS', 1000)">1000 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #a335ee"><b>GOVERNANTE</b><button class="main-btn" onclick="buyTitle('GOVERNANTE', 1500)">1500 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #a335ee"><b>REI DOS MORTOS</b><button class="main-btn" onclick="buyTitle('REI DOS MORTOS', 2000)">2000 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #ffd700"><b>MONARCA DAS SOMBRAS</b><button class="main-btn" onclick="buyTitle('MONARCA DAS SOMBRAS', 2500)">2500 GOLD</button></div>`;
        } else if (currentShopTab === 'equip') {
            html = `<div class="shop-item" style="border-left-color: #888"><b>ADAGA DE KASAKA (1.2x XP)</b><button class="main-btn" onclick="buyEquip('KASAKA', 1.2, 1200)">1200 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #007bff"><b>PRESA VENENOSA DE KASAKA (1.4x XP)</b><button class="main-btn" onclick="buyEquip('VENENO', 1.4, 1800)">1800 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #007bff"><b>ARMADURA DO CAVALEIRO DEMONÍACO (1.7x XP)</b><button class="main-btn" onclick="buyEquip('ARMOR_DEMON', 1.7, 2500)">2500 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #a335ee"><b>ORBE DA AVAREZA (2.0x XP)</b><button class="main-btn" onclick="buyEquip('ORB', 2.0, 3200)">3200 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #a335ee"><b>CAPACETE DO REI DEMÔNIO (2.5x XP)</b><button class="main-btn" onclick="buyEquip('HELM_DEMON', 2.5, 4000)">4000 GOLD</button></div>
            <div class="shop-item" style="border-left-color: #ffd700"><b>ADAGAS DO REI DEMÔNIO (3.0x XP)</b><button class="main-btn" onclick="buyEquip('DAGGER_DEMON', 3.0, 5000)">5000 GOLD</button></div>`;
        }
        document.getElementById('shop-content').innerHTML = html;

        document.querySelectorAll('.shop-tabs button').forEach(btn => {
            btn.classList.toggle('active-tab', btn.id === `tab-${currentShopTab}`);
        });
    }

    function buyItem(type, price) { 
        if(state.gold >= price) { 
            state.gold -= price; 
            if(type === 'xp_small') addXP(50); 
            else if(type === 'xp_medium') addXP(150);
            else if(type === 'xp_big') addXP(300);
            else state[type]++; 
            save(); 
        } else {
            showNotif("OURO INSUFICIENTE!");
        }
    }
    
    function buyTitle(n, p) { 
        if(state.gold >= p) { 
            state.gold -= p; state.currentTitle = n; save(); 
        } else {
            showNotif("OURO INSUFICIENTE!");
        }
    }
    
    function buyEquip(n, m, p) { 
        if(state.gold >= p) { 
            state.gold -= p; state.activeEquip = {name:n, multiplier:m}; save(); 
        } else {
            showNotif("OURO INSUFICIENTE!");
        }
    }

    function updateRadar() {
        const ctx = document.getElementById('radarChart');
        if(!ctx) return;
        if(radarChart) radarChart.destroy();
        
        const maxStat = Math.max(state.str, state.agi, state.vit, state.int);
        
        radarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['STR', 'AGI', 'VIT', 'INT'],
                datasets: [{
                    data: [state.str, state.agi, state.vit, state.int],
                    backgroundColor: 'rgba(0, 212, 255, 0.2)',
                    borderColor: '#00d4ff',
                    borderWidth: 2
                }]
            },
            options: {
                scales: { 
                    r: { 
                        grid: { color: 'rgba(255,255,255,0.1)' }, 
                        angleLines: { color: 'rgba(255,255,255,0.1)' }, 
                        pointLabels: { color: '#00d4ff' }, 
                        ticks: { display: false }, 
                        suggestedMin: 0,
                        suggestedMax: maxStat + 55 
                    } 
                },
                plugins: { legend: { display: false } },
                maintainAspectRatio: false
            }
        });
    }

    function changeTab(id) {
        document.getElementById('snd-tab').play().catch(()=>{});
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`${id}-screen`).classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        document.getElementById(`nav-${id}`).classList.add('active-nav');
        if(id === 'status') setTimeout(updateRadar, 100);
        renderAll();
    }

    function renderAll() {
        const reqXP = getRequiredXP(state.lvl);
        document.getElementById('lvl').innerText = state.lvl;
        document.getElementById('xp-txt').innerText = `${Math.floor(state.xp)}/${reqXP}`;
        document.getElementById('xp-fill').style.width = `${(state.xp / reqXP) * 100}%`;
        document.getElementById('gold-txt').innerText = state.gold;
        document.getElementById('rank-txt').innerText = `[RANK ${getRankLabel()}]`;
        document.getElementById('player-title').innerText = `TITULO: ${state.currentTitle}`;
        document.getElementById('active-equip-txt').innerText = `EQUIP: ${state.activeEquip.name}`;
        ['str','agi','vit','int'].forEach(s => document.getElementById(s).innerText = state[s]);
        
        renderDaily();
        renderShop();

        document.getElementById('quest-list').innerHTML = state.customQuests.map((q, i) => `
            <div class="quest-item">
                <div style="display:flex; justify-content:space-between;">
                    <b>${q.name}</b> <span onclick="deleteQuest(${i})" style="color:var(--danger)">[X]</span>
                </div>
                <div class="timer-display">${Math.floor(q.remaining/60)}:${(q.remaining%60).toString().padStart(2,'0')}</div>
                <button class="main-btn" onclick="startQuest(${i})" ${q.isRunning || q.isDone ? 'disabled' : ''}>
                    ${q.isDone ? 'CONCLUÍDO' : (q.isRunning ? 'TREINANDO...' : 'INICIAR')}
                </button>
            </div>`).join('');
    }

    function openSettings() { document.getElementById('modal-settings').style.display = 'block'; }
    function closeSettings() { document.getElementById('modal-settings').style.display = 'none'; }
    function toggleMusic() {
        const bg = document.getElementById('snd-bg');
        if(bg.paused) { bg.play(); state.isMusicOn = true; } 
        else { bg.pause(); state.isMusicOn = false; }
    }
    function showNotif(m) { document.getElementById('notif-message').innerText = m; document.getElementById('system-notification').style.display = 'block'; }
    function closeNotif() { document.getElementById('system-notification').style.display = 'none'; }
    function clearPenalty() { state.penaltyActive = false; document.getElementById('penalty-overlay').style.display = 'none'; save(); }

    window.onload = () => {
        const today = new Date().toDateString();
        if (state.lastUpdate !== today) {
            if (!state.dailyDone && state.lvl > 1) state.penaltyActive = true;
            state.dailyDone = false;
            state.dailyChecks = [];
            state.lastUpdate = today;
            save();
        }
        if (state.penaltyActive) document.getElementById('penalty-overlay').style.display = 'block';
        renderAll();
        updateRadar();
    };
</script>
</body>
</html>
