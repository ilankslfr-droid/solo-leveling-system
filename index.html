<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solo Leveling: Monarch System v4.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00d4ff; --dark: #020b12; --panel: rgba(5, 15, 25, 0.95); }
        body { background: radial-gradient(circle at center, #0a192f 0%, var(--dark) 100%); color: white; font-family: 'Roboto Condensed', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .hud-container { max-width: 420px; margin: 15px auto; padding: 20px; background: var(--panel); border: 1px solid var(--neon); box-shadow: 0 0 25px rgba(0, 212, 255, 0.15); backdrop-filter: blur(10px); }
        .screen { display: none; min-height: 480px; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hud-header h1 { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--neon); border-bottom: 1px solid var(--neon); padding-bottom: 8px; margin-bottom: 20px; text-transform: uppercase; }
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(0,212,255,0.1); }
        .stat-val { color: var(--neon); font-family: 'Orbitron'; font-weight: bold; }
        .xp-container { background: #111; height: 10px; width: 100%; margin: 15px 0; border: 1px solid #333; }
        .xp-fill { background: var(--neon); height: 100%; width: 0%; transition: 1s; box-shadow: 0 0 15px var(--neon); }
        .quest-item { background: rgba(0, 212, 255, 0.05); border-left: 3px solid var(--neon); margin-bottom: 10px; padding: 12px; display: flex; align-items: center; }
        .quest-item input[type="checkbox"] { transform: scale(1.3); margin-right: 12px; accent-color: var(--neon); }
        .main-btn { width: 100%; background: #000; border: 1px solid var(--neon); color: white; padding: 15px; font-family: 'Orbitron'; cursor: pointer; margin-top: 10px; }
        .main-btn:disabled { opacity: 0.2; }
        .custom-input { width: 70%; background: #000; border: 1px solid #333; color: white; padding: 10px; font-family: 'Orbitron'; font-size: 0.8rem; }
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(2, 11, 18, 0.98); border-top: 1px solid var(--neon); z-index: 1000; }
        nav button { flex: 1; padding: 15px; background: none; border: none; color: #444; font-family: 'Orbitron'; font-size: 0.6rem; }
        nav button.active-nav { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

<div class="hud-container">
    <div id="status-screen" class="screen active">
        <div class="hud-header"><h1>PLAYER STATUS</h1></div>
        <h2 style="font-family:'Orbitron'; margin:0; font-size: 1.5rem;">SUNG JIN-WOO</h2>
        <div style="font-size: 0.8rem; margin: 10px 0;">RANK: <span id="rank" style="color:var(--neon)">E</span> | LVL: <span id="lvl">1</span></div>
        <div class="xp-container"><div id="xp-fill" class="xp-fill"></div></div>
        <div class="stat-row"><span>FORÇA</span> <span id="str" class="stat-val">10</span></div>
        <div class="stat-row"><span>AGILIDADE</span> <span id="agi" class="stat-val">10</span></div>
        <div class="stat-row"><span>VITALIDADE</span> <span id="vit" class="stat-val">10</span></div>
        <div class="stat-row"><span>INTELIGÊNCIA</span> <span id="int" class="stat-val">10</span></div>
        <div style="height: 200px; margin-top: 20px;"><canvas id="radarChart"></canvas></div>
    </div>

    <div id="daily-screen" class="screen">
        <div class="hud-header"><h1>DAILY QUESTS</h1></div>
        <div id="daily-list"></div>
        <button id="btn-collect" class="main-btn" disabled onclick="completeDaily()">COLETAR RECOMPENSA</button>
    </div>

    <div id="custom-screen" class="screen">
        <div class="hud-header"><h1>CUSTOM QUESTS</h1></div>
        <div style="margin-bottom: 20px; display:flex; gap:5px;">
            <input type="text" id="new-quest-name" class="custom-input" placeholder="NOME DA MISSÃO...">
            <button onclick="addCustomQuest()" class="main-btn" style="width:25%; margin:0;">+</button>
        </div>
        <div id="custom-list"></div>
    </div>
</div>

<nav>
    <button onclick="changeTab('status')" id="nav-status" class="active-nav">STATUS</button>
    <button onclick="changeTab('daily')" id="nav-daily">DAILY</button>
    <button onclick="changeTab('custom')" id="nav-custom">CUSTOM</button>
</nav>

<script>
    let state = JSON.parse(localStorage.getItem('monarch_v4')) || {
        lvl: 1, xp: 0, str: 10, agi: 10, vit: 10, int: 10,
        dailyChecks: [false, false, false, false],
        dailyDone: false,
        customQuests: [],
        lastDate: new Date().toDateString()
    };

    if (state.lastDate !== new Date().toDateString()) {
        state.dailyChecks = [false, false, false, false];
        state.dailyDone = false;
        state.lastDate = new Date().toDateString();
        save();
    }

    let myChart;
    const sfxClick = new Audio("sons/aba.m4a");
    const bgMusic = new Audio("sons/tema.m4a");
    let isMusicPlaying = false;

    function save() { localStorage.setItem('monarch_v4', JSON.stringify(state)); render(); }

    function startAudio() {
        if (!isMusicPlaying) {
            bgMusic.loop = true; bgMusic.volume = 0.4; bgMusic.play().catch(()=>{});
            setInterval(() => { if(bgMusic.currentTime >= 17) bgMusic.currentTime = 0; }, 500);
            isMusicPlaying = true;
        }
        sfxClick.currentTime = 0; sfxClick.play().catch(()=>{});
    }

    function render() {
        document.getElementById('lvl').innerText = state.lvl;
        document.getElementById('xp-fill').style.width = state.xp + "%";
        ['str','agi','vit','int'].forEach(s => document.getElementById(s).innerText = state[s]);
        
        // Render Daily
        const tasks = [`Flexões: ${10+state.lvl*2}`, `Abdominais: ${10+state.lvl*2}`, `Agachamentos: ${10+state.lvl*2}`, `Corrida: 2km`];
        document.getElementById('daily-list').innerHTML = tasks.map((t, i) => `
            <div class="quest-item">
                <input type="checkbox" onchange="checkDaily(${i})" ${state.dailyChecks[i]?'checked':''} ${state.dailyDone?'disabled':''}>
                <span>${t}</span>
            </div>`).join('');
        document.getElementById('btn-collect').disabled = !state.dailyChecks.every(c=>c) || state.dailyDone;

        // Render Custom
        document.getElementById('custom-list').innerHTML = state.customQuests.map((q, i) => `
            <div class="quest-item">
                <input type="checkbox" onchange="completeCustom(${i})" ${q.done?'checked disabled':''}>
                <span style="${q.done?'text-decoration:line-through;opacity:0.5':''}">${q.name}</span>
            </div>`).join('');
        updateRadar();
    }

    function addCustomQuest() {
        let val = document.getElementById('new-quest-name').value;
        if(val) { state.customQuests.push({name: val, done: false}); document.getElementById('new-quest-name').value = ""; save(); }
    }

    function completeCustom(i) {
        state.customQuests[i].done = true;
        state.xp += 10; checkLvl(); save();
    }

    function checkDaily(i) { state.dailyChecks[i] = !state.dailyChecks[i]; save(); }

    function completeDaily() {
        state.xp += 50; state.str++; state.agi++; state.vit++; state.dailyDone = true;
        checkLvl(); save();
    }

    function checkLvl() { while(state.xp >= 100) { state.xp -= 100; state.lvl++; } }

    function updateRadar() {
        const ctx = document.getElementById('radarChart'); if(!ctx) return;
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['STR', 'AGI', 'VIT', 'INT'],
                datasets: [{ data: [state.str, state.agi, state.vit, state.int], backgroundColor: 'rgba(0, 212, 255, 0.2)', borderColor: '#00d4ff', borderWidth: 2 }]
            },
            options: { scales: { r: { grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: '#00d4ff' }, ticks: { display: false }, suggestedMin: 0, suggestedMax: state.lvl + 10 } }, plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false }
        });
    }

    function changeTab(id) {
        startAudio();
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        document.getElementById(id + '-screen').classList.add('active');
        document.getElementById('nav-' + id).classList.add('active-nav');
        if(id === 'status') setTimeout(updateRadar, 100);
    }

    window.onload = render;
</script>
</body>
</html>
