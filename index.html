<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monarch System v5.0 - Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00d4ff; --dark: #020b12; --panel: rgba(5, 15, 25, 0.95); }
        body { background: radial-gradient(circle at center, #0a192f 0%, var(--dark) 100%); color: white; font-family: 'Roboto Condensed', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .hud-container { max-width: 420px; margin: 10px auto; padding: 20px; background: var(--panel); border: 1px solid var(--neon); box-shadow: 0 0 25px rgba(0, 212, 255, 0.2); }
        .screen { display: none; min-height: 500px; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hud-header h1 { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--neon); border-bottom: 1px solid var(--neon); padding-bottom: 8px; margin-bottom: 15px; }
        
        /* Stats & Radar */
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,212,255,0.1); }
        .stat-val { color: var(--neon); font-family: 'Orbitron'; font-weight: bold; }
        .radar-box { height: 200px; margin-top: 15px; background: rgba(0,0,0,0.2); }
        
        /* Custom Quest UI */
        .quest-item { background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2); margin-bottom: 10px; padding: 12px; }
        .timer-display { font-family: 'Orbitron'; color: var(--neon); font-size: 1.2rem; text-align: center; margin: 10px 0; }
        
        select, input { background: #000; border: 1px solid #333; color: white; padding: 8px; font-family: 'Orbitron'; font-size: 0.7rem; margin-bottom: 5px; }
        .main-btn { width: 100%; background: #000; border: 1px solid var(--neon); color: white; padding: 12px; font-family: 'Orbitron'; cursor: pointer; transition: 0.2s; margin-top: 5px; }
        .main-btn:active { background: var(--neon); color: black; }
        
        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: rgba(2, 11, 18, 0.98); border-top: 1px solid var(--neon); z-index: 1000; }
        nav button { flex: 1; padding: 18px; background: none; border: none; color: #444; font-family: 'Orbitron'; font-size: 0.6rem; }
        nav button.active-nav { color: var(--neon); text-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>

<div class="hud-container">
    <div id="status-screen" class="screen active">
        <div class="hud-header"><h1>PLAYER STATUS</h1></div>
        <h2 style="font-family:'Orbitron'; margin:0; font-size: 1.4rem;">SUNG JIN-WOO</h2>
        <p style="font-size: 0.8rem; margin: 5px 0;">RANK: <span id="rank" style="color:var(--neon)">E</span> | LVL: <span id="lvl">1</span></p>
        <div class="stat-row"><span>FORÇA (STR)</span> <span id="str" class="stat-val">10</span></div>
        <div class="stat-row"><span>AGILIDADE (AGI)</span> <span id="agi" class="stat-val">10</span></div>
        <div class="stat-row"><span>VITALIDADE (VIT)</span> <span id="vit" class="stat-val">10</span></div>
        <div class="stat-row"><span>INTELIGÊNCIA (INT)</span> <span id="int" class="stat-val">10</span></div>
        <div class="radar-box"><canvas id="radarChart"></canvas></div>
    </div>

    <div id="custom-screen" class="screen">
        <div class="hud-header"><h1>CUSTOM TRAINING</h1></div>
        <div style="display:flex; flex-direction:column; gap:5px; margin-bottom:20px; border:1px solid #222; padding:10px;">
            <input type="text" id="q-name" placeholder="NOME DO TREINO...">
            <div style="display:flex; gap:5px;">
                <select id="q-attr" style="flex:1;">
                    <option value="str">TREINAR STR</option>
                    <option value="agi">TREINAR AGI</option>
                    <option value="vit">TREINAR VIT</option>
                    <option value="int">TREINAR INT</option>
                </select>
                <input type="number" id="q-time" placeholder="MINUTOS" style="width:80px;">
            </div>
            <button onclick="addQuest()" class="main-btn">CRIAR MISSÃO</button>
        </div>
        <div id="quest-list"></div>
    </div>
</div>

<nav>
    <button onclick="tab('status')" id="nav-status" class="active-nav">STATUS</button>
    <button onclick="tab('custom')" id="nav-custom">TRAINING</button>
</nav>

<script>
    let state = JSON.parse(localStorage.getItem('monarch_v5')) || {
        lvl: 1, str: 10, agi: 10, vit: 10, int: 10, quests: []
    };

    let myChart;
    const sfx = new Audio("sons/aba.m4a");
    const bgm = new Audio("sons/tema.m4a");
    let music = false;

    function save() { localStorage.setItem('monarch_v5', JSON.stringify(state)); render(); }

    function startAudio() {
        if (!music) {
            bgm.loop = true; bgm.volume = 0.4; bgm.play().catch(()=>{});
            setInterval(() => { if(bgm.currentTime >= 17) bgm.currentTime = 0; }, 500);
            music = true;
        }
        sfx.currentTime = 0; sfx.play().catch(()=>{});
    }

    function render() {
        document.getElementById('lvl').innerText = state.lvl;
        ['str','agi','vit','int'].forEach(s => document.getElementById(s).innerText = state[s]);
        
        let rank = state.str > 50 ? "S" : state.str > 30 ? "A" : "E";
        document.getElementById('rank').innerText = rank;

        const list = document.getElementById('quest-list');
        list.innerHTML = state.quests.map((q, i) => `
            <div class="quest-item">
                <div style="display:flex; justify-content:space-between; font-family:'Orbitron'; font-size:0.8rem;">
                    <span>${q.name} (+1 ${q.attr.toUpperCase()})</span>
                    <span onclick="removeQuest(${i})" style="color:red;">X</span>
                </div>
                <div class="timer-display" id="timer-${i}">${formatTime(q.remaining)}</div>
                <button class="main-btn" id="btn-${i}" onclick="startTimer(${i})" ${q.running || q.done ? 'disabled' : ''}>
                    ${q.done ? 'CONCLUÍDO' : q.running ? 'TREINANDO...' : 'INICIAR'}
                </button>
            </div>
        `).join('');
        updateRadar();
    }

    function addQuest() {
        let name = document.getElementById('q-name').value;
        let attr = document.getElementById('q-attr').value;
        let mins = parseInt(document.getElementById('q-time').value) || 1;
        if(name) {
            state.quests.push({ name, attr, remaining: mins * 60, running: false, done: false });
            save();
        }
    }

    function formatTime(s) {
        let m = Math.floor(s / 60);
        let sec = s % 60;
        return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
    }

    function startTimer(i) {
        if(state.quests[i].running) return;
        state.quests[i].running = true;
        let interval = setInterval(() => {
            if(state.quests[i].remaining <= 0) {
                clearInterval(interval);
                state.quests[i].running = false;
                state.quests[i].done = true;
                state[state.quests[i].attr]++; // Upa o atributo escolhido
                save();
            } else {
                state.quests[i].remaining--;
                document.getElementById(`timer-${i}`).innerText = formatTime(state.quests[i].remaining);
            }
        }, 1000);
        render();
    }

    function removeQuest(i) { state.quests.splice(i, 1); save(); }

    function updateRadar() {
        const ctx = document.getElementById('radarChart'); if(!ctx) return;
        if(myChart) myChart.destroy();
        // O Radar agora se adapta aos valores reais
        let maxVal = Math.max(state.str, state.agi, state.vit, state.int) + 5;
        myChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['STR', 'AGI', 'VIT', 'INT'],
                datasets: [{ 
                    data: [state.str, state.agi, state.vit, state.int], 
                    backgroundColor: 'rgba(0, 212, 255, 0.2)', 
                    borderColor: '#00d4ff', 
                    borderWidth: 2,
                    pointRadius: 2
                }]
            },
            options: { 
                scales: { 
                    r: { 
                        grid: { color: 'rgba(255,255,255,0.05)' }, 
                        angleLines: { color: 'rgba(255,255,255,0.1)' }, 
                        pointLabels: { color: '#00d4ff', font: { family: 'Orbitron' } }, 
                        ticks: { display: false }, 
                        suggestedMin: 0, 
                        suggestedMax: maxVal 
                    } 
                }, 
                plugins: { legend: { display: false } }, 
                responsive: true, 
                maintainAspectRatio: false 
            }
        });
    }

    function tab(id) {
        startAudio();
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        document.getElementById(id + '-screen').classList.add('active');
        document.getElementById('nav-' + id).classList.add('active-nav');
        if(id === 'status') setTimeout(updateRadar, 100);
    }

    window.onload = render;
</script>
</body>
</html>
