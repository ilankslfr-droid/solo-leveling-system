<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leveling Monarch</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #00d4ff; --dark: #020b12; --panel: rgba(5, 15, 25, 0.95); }
        body { background: #020b12; color: white; font-family: 'Roboto Condensed', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        .hud-container { max-width: 420px; margin: 10px auto; padding: 20px; background: var(--panel); border: 1px solid var(--neon); box-shadow: 0 0 25px rgba(0, 212, 255, 0.2); position: relative; min-height: 90vh; }
        .screen { display: none; }
        .active { display: block; }
        
        .hud-header h1 { font-family: 'Orbitron'; font-size: 1.1rem; color: var(--neon); border-bottom: 1px solid var(--neon); padding-bottom: 8px; margin-bottom: 15px; text-transform: uppercase; }
        
        /* Letras da Daily Quest corrigidas */
        .daily-item { 
            display: flex; align-items: center; gap: 15px; background: rgba(0, 212, 255, 0.05); 
            border: 1px solid rgba(0, 212, 255, 0.1); margin-bottom: 12px; padding: 15px; 
            font-family: 'Orbitron', sans-serif; font-size: 0.85rem; text-transform: uppercase;
        }
        .daily-item input { transform: scale(1.2); accent-color: var(--neon); }

        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(0,212,255,0.1); }
        .stat-val { color: var(--neon); font-family: 'Orbitron'; font-weight: bold; }
        
        .xp-bg { background: #111; height: 10px; width: 100%; margin: 10px 0; border: 1px solid #333; }
        .xp-fill { background: var(--neon); height: 100%; width: 0%; transition: 1s; box-shadow: 0 0 10px var(--neon); }

        .main-btn { width: 100%; background: #000; border: 1px solid var(--neon); color: white; padding: 15px; font-family: 'Orbitron'; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .main-btn:disabled { opacity: 0.3; }

        nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #020b12; border-top: 1px solid var(--neon); height: 70px; z-index: 2000; }
        nav button { flex: 1; background: none; border: none; color: #444; font-family: 'Orbitron'; font-size: 0.7rem; }
        nav button.active-nav { color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        #system-notification { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(0,0,0,0.95); border: 2px solid var(--neon); padding: 20px; z-index: 5000; 
            text-align: center; min-width: 280px; box-shadow: 0 0 30px var(--neon); backdrop-filter: blur(5px); 
        }
    </style>
</head>
<body>

<div class="hud-container">
    <div id="status-screen" class="screen active">
        <div class="hud-header"><h1>PLAYER STATUS</h1></div>
        <h2 style="font-family:'Orbitron'; margin:0;">SUNG JIN-WOO</h2>
        <p>LVL: <span id="lvl">1</span> | XP: <span id="xp-txt">0/100</span></p>
        <div class="xp-bg"><div id="xp-fill" class="xp-fill"></div></div>
        <div class="stat-row"><span>STR</span> <span id="str" class="stat-val">10</span></div>
        <div class="stat-row"><span>AGI</span> <span id="agi" class="stat-val">10</span></div>
        <div class="stat-row"><span>VIT</span> <span id="vit" class="stat-val">10</span></div>
        <div class="stat-row"><span>INT</span> <span id="int" class="stat-val">10</span></div>
        <div style="height: 220px; margin-top: 20px;"><canvas id="radarChart"></canvas></div>
    </div>

    <div id="daily-screen" class="screen">
        <div class="hud-header"><h1>DAILY QUEST</h1></div>
        <div id="daily-list"></div>
        <button id="btn-collect" class="main-btn" disabled onclick="collectDailyRewards()">COLETAR RECOMPENSA</button>
    </div>

    <div id="system-notification">
        <h2 style="font-family:'Orbitron'; color:var(--neon); margin:0;">NOTIFICAÇÃO</h2>
        <p id="notif-message" style="margin:15px 0;"></p>
        <button onclick="closeNotif()" class="main-btn">OK</button>
    </div>
</div>

<nav>
    <button onclick="changeTab('status')" id="nav-status" class="active-nav">STATUS</button>
    <button onclick="changeTab('daily')" id="nav-daily">DAILY</button>
</nav>

<script>
    let state = JSON.parse(localStorage.getItem('monarch_save')) || {
        lvl: 1, xp: 0, str: 10, agi: 10, vit: 10, int: 10,
        dailyChecks: [false, false, false, false], dailyDone: false
    };

    let radarChart;

    function save() { localStorage.setItem('monarch_save', JSON.stringify(state)); renderAll(); }

    function showNotif(msg) {
        document.getElementById('notif-message').innerText = msg;
        document.getElementById('system-notification').style.display = 'block';
    }

    function closeNotif() { document.getElementById('system-notification').style.display = 'none'; }

    function renderAll() {
        document.getElementById('lvl').innerText = state.lvl;
        document.getElementById('xp-txt').innerText = state.xp + "/100";
        document.getElementById('xp-fill').style.width = state.xp + "%";
        ['str','agi','vit','int'].forEach(s => document.getElementById(s).innerText = state[s]);

        const tasks = ["Flexões: 12", "Abdominais: 12", "Agachamentos: 12", "Corrida: 2km"];
        document.getElementById('daily-list').innerHTML = tasks.map((t, i) => `
            <div class="daily-item">
                <input type="checkbox" onchange="toggleDaily(${i})" ${state.dailyChecks[i] ? 'checked' : ''} ${state.dailyDone ? 'disabled' : ''}>
                <span>${t}</span>
            </div>`).join('');
        
        document.getElementById('btn-collect').disabled = !state.dailyChecks.every(v => v) || state.dailyDone;
        updateRadar();
    }

    function toggleDaily(i) { state.dailyChecks[i] = !state.dailyChecks[i]; save(); }

    function collectDailyRewards() {
        state.xp += 50; state.str++; state.agi++; state.dailyDone = true;
        if(state.xp >= 100) { state.xp -= 100; state.lvl++; }
        showNotif("MISSÃO DIÁRIA CONCLUÍDA!");
        save();
    }

    function updateRadar() {
        const ctx = document.getElementById('radarChart');
        if (!ctx) return;
        if (radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['STR', 'AGI', 'VIT', 'INT'],
                datasets: [{ 
                    data: [state.str, state.agi, state.vit, state.int], 
                    backgroundColor: 'rgba(0, 212, 255, 0.2)', 
                    borderColor: '#00d4ff', 
                    borderWidth: 2 
                }]
            },
            options: {
                scales: { r: { suggestedMin: 0, suggestedMax: 30, ticks: { display: false }, pointLabels: { color: '#00d4ff', font: { family: 'Orbitron' } } } },
                plugins: { legend: { display: false } }, responsive: true, maintainAspectRatio: false
            }
        });
    }

    function changeTab(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id + '-screen').classList.add('active');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
        document.getElementById('nav-' + id).classList.add('active-nav');
        if(id === 'status') setTimeout(updateRadar, 100);
    }

    window.onload = renderAll;
</script>
</body>
</html>
