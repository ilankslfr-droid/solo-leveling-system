<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling: System HUD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>
    <style>
        :root { --neon-blue: #00d4ff; --bg-dark: #020b12; --glass: rgba(0, 212, 255, 0.05); }
        
        body { 
            background: radial-gradient(circle at center, #0a192f 0%, var(--bg-dark) 100%); 
            color: white; font-family: 'Rajdhani', sans-serif; margin: 0; padding-bottom: 80px;
            min-height: 100vh;
        }

        /* TELA ESTILO HUD */
        .hud-container {
            max-width: 400px; margin: 20px auto; padding: 20px;
            background: rgba(5, 15, 25, 0.85);
            border: 1px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2), inset 0 0 10px rgba(0, 212, 255, 0.1);
            backdrop-filter: blur(10px); border-radius: 2px;
        }

        .screen { display: none; animation: scanline 0.5s ease-out; }
        .active { display: block; }

        @keyframes scanline {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CABEÇALHO DO STATUS */
        .hud-header {
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 10px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }

        .hud-header h1 { 
            font-family: 'Orbitron'; font-size: 1.2rem; margin: 0; 
            letter-spacing: 3px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);
        }

        /* PLAYER CARD ESTILO ANIME */
        .player-info { margin-bottom: 25px; }
        .player-name { font-family: 'Orbitron'; font-size: 1.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .player-title { color: var(--neon-blue); font-size: 0.9rem; letter-spacing: 2px; }

        .rank-display {
            font-family: 'Orbitron';
            font-size: 5.5rem; /* Aumentei um pouco para dar mais impacto */
            position: absolute;
            top: 40px;        /* Estava -10px, agora desceu para alinhar com o nome */
            right: 20px;       /* Recuou um pouco da borda */
            opacity: 0.15;     /* Ficou um pouco mais sutil como na imagem */
            color: var(--neon-blue);
            pointer-events: none;
            line-height: 1;    /* Garante que o espaço em volta da letra não empurre nada */
            text-shadow: 0 0 15px var(--neon-blue);
        }
        }

        /* ATRIBUTOS */
        .stat-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(0, 212, 255, 0.1);
        }
        .stat-label { font-size: 1.1rem; letter-spacing: 1px; color: #ccc; }
        .stat-value { font-family: 'Orbitron'; color: var(--neon-blue); font-size: 1.2rem; }

        .up-btn {
            background: none; border: 1px solid var(--neon-blue); color: var(--neon-blue);
            padding: 2px 10px; cursor: pointer; font-family: 'Orbitron'; margin-left: 10px;
            transition: 0.3s;
        }
        .up-btn:hover { background: var(--neon-blue); color: black; }

        /* BARRAS DE PROGRESSO */
        .bar-container { background: rgba(0,0,0,0.5); height: 6px; width: 100%; margin: 10px 0; overflow: hidden; }
        .bar-fill { 
            background: linear-gradient(90deg, transparent, var(--neon-blue)); 
            height: 100%; width: 0%; transition: 1s; box-shadow: 0 0 10px var(--neon-blue);
        }

        /* MISSÕES */
        .quest-card {
            background: var(--glass); border-left: 3px solid var(--neon-blue);
            padding: 15px; margin: 15px 0; display: flex; justify-content: space-between;
        }

        /* NAV */
        nav { 
            position: fixed; bottom: 0; width: 100%; display: flex; 
            background: rgba(2, 11, 18, 0.95); border-top: 1px solid var(--neon-blue);
        }
        nav button { 
            flex: 1; padding: 15px; background: none; border: none; 
            color: #555; font-family: 'Orbitron'; cursor: pointer;
        }
        nav button.active-nav { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        /* PUNIÇÃO */
        #punishment-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(20, 0, 0, 0.95); z-index: 1000; display:none;
            flex-direction:column; justify-content:center; align-items:center;
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <div id="status-screen" class="screen active">
            <div class="hud-header">
                <h1>STATUS WINDOW</h1>
            </div>
            
            <div class="rank-display" id="rank-letter">E</div>
            
            <div class="player-info">
                <div class="player-name" id="display-name" onclick="changeName()">HUNTER</div>
                <div class="player-title">CLASSE: HUMANO</div>
            </div>

            <div style="margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                    <span>LEVEL: <span id="lvl">1</span></span>
                    <span id="xp-txt">0/100 XP</span>
                </div>
                <div class="bar-container"><div id="xp-fill" class="bar-fill"></div></div>
            </div>

            <div id="pts-alert" style="color: gold; font-size: 0.8rem; margin-bottom: 10px; display:none;">
                [PONTOS DISPONÍVEIS: <span id="pts">0</span>]
            </div>

            <div class="stat-row"><span class="stat-label">FORÇA (STR)</span> <div><span class="stat-value" id="str">10</span><button class="up-btn" onclick="upStat('str')">+</button></div></div>
            <div class="stat-row"><span class="stat-label">AGILIDADE (AGI)</span> <div><span class="stat-value" id="agi">10</span><button class="up-btn" onclick="upStat('agi')">+</button></div></div>
            <div class="stat-row"><span class="stat-label">VITALIDADE (VIT)</span> <div><span class="stat-value" id="vit">10</span><button class="up-btn" onclick="upStat('vit')">+</button></div></div>
            <div class="stat-row"><span class="stat-label">INTELIGÊNCIA (INT)</span> <div><span class="stat-value" id="int">10</span><button class="up-btn" onclick="upStat('int')">+</button></div></div>
        </div>

        <div id="quest-screen" class="screen">
            <div class="hud-header"><h1>DAILY QUESTS</h1></div>
            
            <div style="background: rgba(0,212,255,0.05); padding: 15px; margin-bottom: 20px; border: 1px dashed var(--neon-blue);">
                <input type="text" id="q-name" placeholder="Nova Missão" style="width:100%; background:none; border:none; border-bottom:1px solid #444; color:white; margin-bottom:10px; padding:5px;">
                <div style="display:flex; gap:10px;">
                    <input type="time" id="q-time" style="background:none; border:1px solid #444; color:white; flex:1;">
                    <input type="number" id="q-xp" placeholder="XP" style="background:none; border:1px solid #444; color:white; width:60px;">
                </div>
                <button onclick="addQuest()" style="width:100%; margin-top:10px; background:var(--neon-blue); border:none; padding:10px; font-family:'Orbitron'; font-weight:bold;">REGISTRAR QUEST</button>
            </div>

            <div id="quest-list"></div>
        </div>
    </div>

    <div id="punishment-overlay">
        <h1 style="color: #ff3333; font-family: 'Orbitron';">PENALIDADE</h1>
        <p>VOCÊ FALHOU EM CONCLUIR A MISSÃO DIÁRIA</p>
        <button onclick="acceptPunishment()" style="background: white; padding: 10px 30px; border:none; font-family:'Orbitron'; font-weight:bold;">ACEITAR</button>
    </div>

    <nav>
        <button onclick="showScreen('status')" id="nav-status" class="active-nav">STATUS</button>
        <button onclick="showScreen('quest')" id="nav-quest">QUESTS</button>
    </nav>

    <script>
        // Lógica de Estado (Salva no LocalStorage)
        let state = JSON.parse(localStorage.getItem('solo_hud_v1')) || {
            name: "SUNG JIN-WOO", lvl: 1, xp: 0, pts: 0, str: 10, agi: 10, vit: 10, int: 10, quests: []
        };

        function save() {
            localStorage.setItem('solo_hud_v1', JSON.stringify(state));
            render();
        }

        const getRank = (l) => {
            if(l >= 46) return "S"; if(l >= 31) return "A"; if(l >= 21) return "B";
            if(l >= 13) return "C"; if(l >= 6) return "D"; return "E";
        }

        function render() {
            document.getElementById('display-name').innerText = state.name;
            document.getElementById('lvl').innerText = state.lvl;
            document.getElementById('rank-letter').innerText = getRank(state.lvl);
            document.getElementById('xp-fill').style.width = state.xp + "%";
            document.getElementById('xp-txt').innerText = state.xp + "/100 XP";
            document.getElementById('pts').innerText = state.pts;
            document.getElementById('pts-alert').style.display = state.pts > 0 ? 'block' : 'none';
            
            ['str','agi','vit','int'].forEach(s => document.getElementById(s).innerText = state[s]);

            const list = document.getElementById('quest-list');
            list.innerHTML = "";
            state.quests.forEach(q => {
                list.innerHTML += `
                    <div class="quest-card">
                        <div>
                            <div style="font-size:0.7rem; color:var(--neon-blue)">LIMIT: ${q.time}</div>
                            <div style="font-size:1.2rem; font-family:'Orbitron'">${q.name}</div>
                        </div>
                        <button onclick="completeQuest(${q.id})" class="up-btn">CONCLUIR</button>
                    </div>
                `;
            });
        }

        function addQuest() {
            const name = document.getElementById('q-name').value;
            const time = document.getElementById('q-time').value;
            const xp = parseInt(document.getElementById('q-xp').value);
            if(name && time && xp) {
                state.quests.push({ name, time, xp, id: Date.now() });
                save();
            }
        }

        function completeQuest(id) {
            const idx = state.quests.findIndex(q => q.id === id);
            state.xp += state.quests[idx].xp;
            while(state.xp >= 100) { state.xp -= 100; state.lvl++; state.pts += 5; }
            state.quests.splice(idx, 1);
            save();
        }

        function checkTime() {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            state.quests.forEach(q => {
                if (timeStr > q.time) document.getElementById('punishment-overlay').style.display = 'flex';
            });
        }

        function upStat(s) { if(state.pts > 0) { state[s]++; state.pts--; save(); } }
        function changeName() { const n = prompt("Novo Nome:", state.name); if(n) { state.name = n; save(); } }
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id + '-screen').classList.add('active');
            document.getElementById('nav-' + id).classList.add('active-nav');
        }
        function acceptPunishment() {
            state.xp = 0; state.quests = [];
            ['str','agi','vit','int'].forEach(s => state[s] = Math.max(1, state[s]-1));
            document.getElementById('punishment-overlay').style.display = 'none';
            save();
        }

        setInterval(checkTime, 10000);
        render();
    </script>
</body>
</html>
